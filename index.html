<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Presencialidad por Profesor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.6;
        }
        .container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; animation: fadeIn 0.8s ease-out; }
        header { text-align: center; padding: 3rem 2rem; background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow); position: relative; overflow: hidden; }
        header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--primary), var(--accent)); }
        h1 { font-size: 2.1rem; background: linear-gradient(to right, #1d4ed8, #4f46e5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        
        .search-container { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1rem; background: var(--bg-card); padding: 2rem; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .search-container label { font-size: 1rem; color: var(--text-main); font-weight: 600; }
        .input-wrapper { position: relative; width: 100%; }
        .input-wrapper i { position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.2rem; }
        input { width: 100%; background: #f1f5f9; border: 2px solid #cbd5e1; color: var(--text-main); padding: 1rem 1rem 1rem 3.5rem; border-radius: 12px; font-size: 1.2rem; outline: none; transition: all 0.3s; font-family: inherit; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); background: #ffffff; }
        
        .filters-summary { font-size: 1.1rem; color: var(--primary); margin-bottom: 1rem; font-weight: 500; text-align: center; }
        
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s; position: relative; overflow: hidden; border-left: 5px solid var(--success); box-shadow: var(--shadow); }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border-color); }
        .card-title { font-size: 1.25rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.25rem; }
        .badge { background: #d1fae5; color: #047857; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .detail-row { display: flex; align-items: center; gap: 0.75rem; margin-top: 0.75rem; font-size: 1.05rem; color: var(--text-main); }
        .detail-row i { color: var(--primary); width: 20px; text-align: center; }
        
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-size: 1.2rem; }
        .empty-state i { font-size: 4rem; opacity: 0.4; margin-bottom: 1.5rem; display: block; }
        
        .download-btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; background: #ef4444; color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 1rem; outline: none; }
        .download-btn:hover { background: #dc2626; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }

        .export-mode { background: #ffffff !important; padding: 2rem; }
        .export-mode .filters-summary { color: #000000 !important; }
        .export-mode .card { box-shadow: none !important; border: 2px solid #000000 !important; background: #ffffff !important; }
        .export-mode .card * { color: #000000 !important; }
        .export-mode .card i { color: #000000 !important; }
        .export-mode .badge { border: 1px solid #000000 !important; background: transparent !important; color: #000000 !important; }
        .export-mode .detail-row { border-color: #000000 !important; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

                                        "Materia": "Seminario de Actualización"
                                }
                        ],
                        "Jueves": [
                                {
                                        "Profesor": "Polcán",
                                        "Materia": "Gestión de Proyectos"
                                }
                        ],
                        "Viernes": []
                }
        }
};
        const schedule = DB.schedule;
        const professors = DB.professors;
        const allComisiones = Object.keys(professors);

        const inputSearch = document.getElementById('s-profesor');
        const container = document.getElementById('results');
        const summary = document.getElementById('filtersSummary');

        function isPresencial(value) {
            if (!value) return false;
            // Evaluamos Disp. Docente como no requiere aula presencial estándar.
            if (value.toLowerCase().includes("docente")) return false; 
            return true;
        }

        function getExactDate(dia, rangeStr) {
            const dayMap = { 'Lunes': 0, 'Martes': 1, 'Miércoles': 2, 'Jueves': 3, 'Viernes': 4 };
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            // Specific holidays provided by user
            const holidays = ["23/3", "24/4", "2/4", "3/4", "1/5", "25/5", "15/6", "9/7", "10/7"];
            
            // Extract HH/MM from range "DD/MM al DD/MM" or similar
            const match = rangeStr.match(/(\d+)\/(\d+)/);
            if (!match) return { short: dia, full: dia, isHoliday: false }; 

            let day = parseInt(match[1]);
            let month = parseInt(match[2]) - 1; // 0-indexed month
            
            // We use 2026 as the reference year for date arithmetic
            const d = new Date(2026, month, day);
            
            // Add offset based on day of week
            const offset = dayMap[dia] || 0;
            d.setDate(d.getDate() + offset);
            
            const finalDay = d.getDate();
            const finalMonthNum = d.getMonth();
            const finalMonthName = monthNames[finalMonthNum];
            
            // Check if this date is in our holiday list
            const dateStr = `${finalDay}/${finalMonthNum + 1}`;
            const isHoliday = holidays.includes(dateStr);
            
            const fullDate = `${dia} ${finalDay} de ${finalMonthName}`;
            return {
                short: `${dia} ${finalDay}`,
                full: fullDate,
                formatted: fullDate,
                isHoliday: isHoliday
            };
        }

        function renderResults() {
            const searchStr = inputSearch.value.trim().toLowerCase();
            
            if (!searchStr) {
                summary.innerHTML = '';
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i class="fas fa-keyboard"></i>
                        Ingresa un nombre de profesor para visualizar el cronograma presencial.
                    </div>
                `;
                return;
            }

            let teacherClasses = [];
            let foundNames = new Set();
            
            allComisiones.forEach(com => {
                Object.entries(professors[com]).forEach(([dia, clases]) => {
                    clases.forEach(c => {
                        if (c.Profesor.toLowerCase().includes(searchStr)) {
                            foundNames.add(c.Profesor);
                            teacherClasses.push({
                                profesor: c.Profesor,
                                materia: c.Materia,
                                comision: com,
                                dia: dia
                            });
                        }
                    });
                });
            });

            if (teacherClasses.length === 0) {
                summary.innerHTML = '';
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1; color: var(--danger)">
                        <i class="fas fa-search-minus" style="color: var(--danger)"></i>
                        No se encontró ningún resultado que coincida con "${searchStr}".
                    </div>
                `;
                return;
            }

            let presencialAssignments = [];
            
            teacherClasses.forEach(tc => {
                let hasPresencial = false;
                schedule.forEach(week => {
                    const value = week[tc.comision];
                    if (isPresencial(value)) {
                        hasPresencial = true;
                        const dateDetails = getExactDate(tc.dia, week.FECHAS);
                        presencialAssignments.push({
                            ...tc,
                            semana: parseInt(week.SEMANA), 
                            semanaStr: week.SEMANA,
                            fechas: week.FECHAS,
                            exactDate: dateDetails.short,
                            isHoliday: dateDetails.isHoliday,
                            aula: value
                        });
                    }
                });

                if (!hasPresencial) {
                    presencialAssignments.push({
                        ...tc,
                        semana: 999, 
                        semanaStr: "-",
                        fechas: "Cursada habitual",
                        exactDate: tc.dia,
                        isHoliday: false,
                        aula: "Modalidad Virtual / Disp. Docente",
                        isVirtual: true
                    });
                }
            });

            if (presencialAssignments.length === 0) {
                const names = Array.from(foundNames).join(", ");
                summary.innerHTML = `Profesor(es): ${names}`;
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1; color: var(--warning)">
                        <i class="fas fa-laptop-house" style="color: var(--warning)"></i>
                        El profesor tiene asignaciones, pero ninguna requiere presencialidad directa según la matriz de aulas.
                    </div>
                `;
                return;
            }

            presencialAssignments.sort((a, b) => a.semana - b.semana);

            const namesDisp = Array.from(foundNames).join(" | ");
            summary.innerHTML = `
                <div><i class="fas fa-calendar-check"></i> Mostrando clases para: <strong>${namesDisp}</strong></div>
                <button class="download-btn" onclick="downloadPdf()"><i class="fas fa-file-pdf"></i> Guardar como PDF</button>
            `;

            let html = '';
            presencialAssignments.forEach((item, index) => {
                const isVirtualBadge = item.isVirtual ? 'background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1;' : '';
                html += `
                    <div class="card" style="animation: slideUp 0.5s ease-out forwards; opacity: 0; animation-delay: ${Math.min(index * 0.05, 1)}s; ${item.isVirtual ? 'border-left-color: #94a3b8;' : ''}">
                        <div class="card-header">
                            <span><i class="fas fa-users"></i> ${item.comision}</span>
                            <span class="badge" style="${isVirtualBadge}"><i class="fas ${item.isVirtual ? 'fa-laptop-house' : 'fa-school'}"></i> ${item.isVirtual ? 'Virtual' : 'Semana ' + item.semanaStr}</span>
                        </div>
                        <div class="card-title">${item.materia}</div>
                        
                        <div class="detail-row">
                            <i class="fas fa-calendar-day"></i> ${item.exactDate} (${item.fechas})
                        </div>
                        
                        <div class="detail-row">
                            <i class="fas fa-map-marker-alt"></i> 
                            <span>Aula: ${item.isHoliday ? '<strong style="color: var(--danger); text-transform: uppercase;">Feriado</strong>' : item.aula}</span>
                        </div>
                        
                        <div class="detail-row" style="font-size:0.95rem; color:var(--text-muted); margin-top: 1rem; border-top: 1px solid var(--border-color); padding-top: 0.75rem;">
                            <i class="fas fa-user-tie"></i> ${item.profesor}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function downloadPdf() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            
            const profName = inputSearch.value.trim();
            
            pdf.setFontSize(16);
            pdf.setFont("helvetica", "bold");
            pdf.text(`Cronograma Presencial - ${profName.toUpperCase()}`, 14, 20);
            
            pdf.setFontSize(11);
            pdf.setFont("helvetica", "normal");
            
            let y = 30;
            const cards = document.querySelectorAll('.card');
            
            if (cards.length === 0) {
                pdf.text("No se encontraron clases presenciales.", 14, y);
            } else {
                cards.forEach(card => {
                    const headerTxt = card.querySelector('.card-header').innerText.trim().replace(/\n/g, ' - ');
                    const titleTxt = card.querySelector('.card-title').innerText.trim();
                    const details = card.querySelectorAll('.detail-row');
                    const fechaTxt = details[0].innerText.trim(); // Now contains the exact date string
                    const aulaTxt = details[1].innerText.trim();
                    const profTxt = details[2].innerText.trim();
                    
                    // Add new page if content exceeds A4 length
                    if (y > 270) {
                        pdf.addPage();
                        y = 20;
                    }
                    
                    // Print structured text block
                    pdf.setFont("helvetica", "bold");
                    pdf.text(headerTxt, 14, y);
                    y += 6;
                    
                    pdf.setFont("helvetica", "normal");
                    pdf.text(`Materia: ${titleTxt}`, 14, y);
                    y += 6;
                    
                    pdf.text(`Fecha: ${fechaTxt}`, 14, y);
                    y += 6;
                    
                    pdf.text(aulaTxt, 14, y);
                    y += 6;
                    
                    pdf.text(`Docente: ${profTxt}`, 14, y);
                    y += 10;
                    
                    // Separator line
                    pdf.setDrawColor(200);
                    pdf.line(14, y - 3, 196, y - 3);
                    y += 6;
                });
            }
            
            pdf.save(`cronograma_${profName}.pdf`);
        }

        inputSearch.addEventListener('input', renderResults);
    </script>
</body>
</html>
